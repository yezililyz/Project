<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Proof of Match — Yezi Li</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600&family=IBM+Plex+Serif:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
  :root {
    --bg:#E4E6E9;
    --card:#FFFFFF;
    --navy:#1F3A5F;
    --teal:#18A999;
    --teal-dim:rgba(24,169,153,.12);
    --teal-b:rgba(24,169,153,.28);
    --ink:#1A1A1A;
    --ink2:#3D3D3D;
    --muted:#6E7580;
    --border:#D8DADD;
    --border-l:rgba(0,0,0,.07);
    --head:'Barlow Condensed',sans-serif;
    --body:'Barlow',sans-serif;
    --serif:'IBM Plex Serif',Georgia,serif;
    --mono:'IBM Plex Mono',monospace;
    --r:8px;
    --r2:14px;
    --sh:0 2px 12px rgba(0,0,0,.07);
    --sh2:0 6px 32px rgba(0,0,0,.11);
    --col:760px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;font-size:16px;}
  body{
    font-family:var(--body);
    background:var(--bg);
    color:var(--ink);
    line-height:1.7;
    -webkit-font-smoothing:antialiased;
  }
  a{color:var(--navy);text-decoration:none;}
  a:hover{text-decoration:underline;}

  .nav{
    position:sticky;top:0;z-index:100;
    background:var(--bg);
    border-bottom:1px solid rgba(0,0,0,.1);
    padding:0 48px;
    display:flex;align-items:center;justify-content:space-between;
    height:72px;
  }
  .nav-left{display:flex;align-items:center;gap:28px;}
  .nav-logo{text-decoration:none;display:flex;align-items:center;}
  .nav-logo svg{width:44px;height:44px;}
  .nav-tagline{
    font-family:var(--body);font-size:.9rem;font-weight:400;
    color:var(--ink2);letter-spacing:-.01em;
  }
  .nav-links{display:flex;align-items:center;gap:32px;}
  .nav-links a{
    font-family:var(--head);font-size:.85rem;font-weight:700;
    letter-spacing:.08em;text-transform:uppercase;
    color:var(--ink);text-decoration:none;
    padding-bottom:3px;border-bottom:2px solid transparent;
    transition:border-color .2s,color .2s;
  }
  .nav-links a:hover{color:var(--teal);border-color:var(--teal);}

  .shell{
    max-width:var(--col);
    margin:32px auto 64px auto;
    padding:32px 32px 40px 32px;
    background:var(--card);
    border-radius:var(--r2);
    box-shadow:var(--sh2);
  }
  .hero-eyebrow{
    font-family:var(--head);
    font-size:.8rem;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:8px;
  }
  h1{
    font-family:var(--head);
    font-size:2.4rem;
    letter-spacing:.02em;
    margin-bottom:8px;
  }
  .hero-meta{
    font-size:.9rem;
    color:var(--muted);
    margin-bottom:16px;
  }
  .hero-actions{
    display:flex;
    gap:12px;
    margin-bottom:24px;
  }
  .btn-primary{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    padding:10px 18px;
    border-radius:6px;
    border:none;
    background:var(--teal);
    color:#fff;
    font-family:var(--head);
    font-size:.85rem;
    letter-spacing:.08em;
    text-transform:uppercase;
  }

  h2{
    font-family:var(--head);
    font-size:1.4rem;
    letter-spacing:.12em;
    text-transform:uppercase;
    margin-top:32px;
    margin-bottom:10px;
  }
  h3{
    font-family:var(--head);
    font-size:1.1rem;
    letter-spacing:.08em;
    text-transform:uppercase;
    margin-top:24px;
    margin-bottom:6px;
  }
  p{margin-bottom:12px;}
  ul{margin-left:20px;margin-bottom:12px;}
  li{margin-bottom:4px;}

  .conf-callout{
    border-left:4px solid var(--teal);
    background:var(--teal-dim);
    padding:12px 14px;
    font-size:.9rem;
    color:var(--ink2);
    margin-bottom:24px;
  }
  .quote{
    font-family:var(--serif);
    font-size:.95rem;
    font-style:italic;
    border-left:3px solid var(--border);
    padding-left:10px;
    margin-bottom:10px;
  }

  .screenshots-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:16px;
    margin-top:8px;
    margin-bottom:8px;
  }
  .screenshot-card{
    background:#111;
    color:#f5f5f5;
    border-radius:10px;
    overflow:hidden;
    box-shadow:var(--sh);
  }
  .screenshot-card img{
    display:block;
    width:100%;
    height:auto;
  }
  .screenshot-card figcaption{
    font-size:.85rem;
    padding:10px 12px;
    color:#d1d5db;
  }
